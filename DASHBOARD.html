<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analog Voice Denoiser | Profesyonel Kontrol Paneli</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.7);
            --border: rgba(0, 210, 255, 0.15);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            background: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
        }

        .dashboard {
            width: 90%;
            max-width: 1100px;
            background: var(--card);
            backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 48px;
            box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 56px;
        }

        .system-status {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--primary);
            font-weight: 600;
        }

        .status-indicator {
            width: 10px;
            height: 10px;
            background: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--primary);
            animation: breathe 3s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.2); opacity: 1; filter: brightness(1.2); }
        }

        h1 {
            font-size: 2.75rem;
            margin: 8px 0 0 0;
            letter-spacing: -0.02em;
            font-weight: 700;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .main-content {
            display: grid;
            grid-template-columns: 2.2fr 1fr;
            gap: 40px;
        }

        .viz-container {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            padding: 32px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .spectrum-analyzer {
            height: 280px;
            display: flex;
            align-items: flex-end;
            gap: 6px;
        }

        .frequency-bar {
            flex: 1;
            background: linear-gradient(to top, var(--secondary), var(--primary));
            border-radius: 4px 4px 0 0;
            transition: height 0.15s cubic-bezier(0.17, 0.67, 0.83, 0.67);
            opacity: 0.7;
        }

        .metrics-panel {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .metric-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 24px;
            border-radius: 20px;
            transition: transform 0.3s;
        }

        .metric-card:hover {
            transform: translateY(-4px);
            background: rgba(255, 255, 255, 0.04);
        }

        .metric-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 8px;
        }

        .metric-value {
            font-size: 1.75rem;
            font-weight: 600;
            color: #fff;
        }

        .action-bar {
            margin-top: 56px;
            display: flex;
            gap: 16px;
        }

        .button {
            padding: 14px 32px;
            border-radius: 12px;
            font-family: inherit;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
        }

        .button-primary {
            background: var(--primary);
            color: var(--bg);
        }

        .button-primary:hover {
            background: #fff;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.4);
        }

        .button-outline {
            background: transparent;
            border: 1.5px solid var(--border);
            color: var(--text-main);
        }

        .button-outline:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 16px;
            margin-bottom: 30px;
        }

        .control-group {
            background: rgba(255, 255, 255, 0.03);
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        select {
            width: 100%;
            background: #1e293b;
            color: #fff;
            border: 1px solid var(--border);
            padding: 8px;
            border-radius: 8px;
            font-family: inherit;
            cursor: pointer;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--primary);
            cursor: pointer;
        }

        .control-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        #file-input {
            display: none;
        }

        .processing-overlay {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 100;
            border-radius: 32px;
        }

        .loader {
            width: 48px;
            height: 48px;
            border: 3px solid var(--primary);
            border-bottom-color: transparent;
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="header">
            <div>
                <div class="system-status">
                    <div class="status-indicator"></div>
                    Sinyal İşlemci Aktif
                </div>
                <h1>ANALOG CORE v1.0</h1>
            </div>
            <div style="text-align: right">
                <div class="metric-label">Proje Durumu</div>
                <div class="metric-value" style="font-size: 1.25rem; color: var(--primary)">AKTİF ARAŞTIRMA</div>
            </div>
        </div>

        <div class="main-content">
            <div class="viz-container">
                <div class="controls">
                    <div class="control-group">
                        <div class="control-header"><span>ALGORİTMA</span></div>
                        <select id="algo-select">
                            <option value="wiener">Wiener Filter</option>
                            <option value="spectral">Spectral Subtraction</option>
                            <option value="lms">LMS Adaptive</option>
                        </select>
                    </div>
                    <div class="control-group">
                        <div class="control-header">
                            <span>EŞİK HASSASİYETİ</span>
                            <span id="thresh-val">1.2x</span>
                        </div>
                        <input type="range" min="0.5" max="3.0" step="0.1" value="1.2" oninput="document.getElementById('thresh-val').innerText = this.value + 'x'">
                    </div>
                    <div class="control-group">
                        <div class="control-header">
                            <span>VAD YOĞUNLUĞU</span>
                            <span id="vad-val">0.02</span>
                        </div>
                        <input type="range" min="0.001" max="0.1" step="0.001" value="0.02" oninput="document.getElementById('vad-val').innerText = this.value">
                    </div>
                </div>
                <div class="metric-label">Premium Spektral Analizör</div>
                <div class="spectrum-analyzer" id="analyzer">
                    <!-- JavaScript tarafından doldurulacak -->
                </div>
            </div>
            <div class="metrics-panel">
                <div class="metric-card">
                    <div class="metric-label">Sinyal Enerjisi (RMS)</div>
                    <div class="metric-value" id="rms-val">0.0000</div>
                </div>
                <div class="metric-card" style="border-left: 3px solid #ff7e5f">
                    <div class="metric-label">Zero Crossing Rate</div>
                    <div class="metric-value" id="zcr-val">0.00</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Gecikme Profili</div>
                    <div class="metric-value" style="color: #4ade80">0.4 ms</div>
                </div>
            </div>
        </div>

        <div class="action-bar">
            <input type="file" id="file-input" accept=".wav">
            <button class="button button-primary" onclick="initAudio()">Mikrofonu Başlat</button>
            <button class="button button-outline" onclick="document.getElementById('file-input').click()">Sesi İşle</button>
            <button class="button button-outline" onclick="location.reload()">Sistemi Resetle</button>
        </div>

        <div class="processing-overlay" id="overlay">
            <div class="loader"></div>
            <p style="margin-top: 16px; font-weight: 600; letter-spacing: 0.1em; color: var(--primary)">SİNYAL İŞLENİYOR...</p>
        </div>
    </div>

    <script>
        const analyzer = document.getElementById('analyzer');
        const barCount = 48;
        const bars = [];

        for (let i = 0; i < barCount; i++) {
            const bar = document.createElement('div');
            bar.className = 'frequency-bar';
            analyzer.appendChild(bar);
            bars.push(bar);
        }

        let audioContext, analyser, dataArray;
        let isRealTime = false;

        async function initAudio() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                const source = audioContext.createMediaStreamSource(stream);
                source.connect(analyser);
                analyser.fftSize = 256;
                const bufferLength = analyser.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);
                isRealTime = true;
                document.querySelector('.button-primary').innerText = "Mikrofon Aktif";
                document.querySelector('.button-primary').style.background = "#4ade80";
                updateViz();
            } catch (err) {
                console.error("Mikrofon erişimi reddedildi:", err);
                alert("Mikrofon erişimi gereklidir.");
            }
        }

        function updateViz() {
            if (isRealTime) {
                analyser.getByteFrequencyData(dataArray);
                
                // RMS ve ZCR simülasyonu (Analizör verisinden)
                let sum = 0;
                let crossings = 0;
                for(let i=0; i<dataArray.length; i++) {
                    sum += dataArray[i]**2;
                    if(i > 0 && (dataArray[i] > 128) !== (dataArray[i-1] > 128)) crossings++;
                }
                const rms = Math.sqrt(sum / dataArray.length) / 255;
                document.getElementById('rms-val').innerText = rms.toFixed(4);
                document.getElementById('zcr-val').innerText = (crossings / dataArray.length).toFixed(2);

                bars.forEach((bar, index) => {
                    const value = dataArray[index] || 0;
                    const percent = (value / 255) * 100;
                    bar.style.height = `${Math.max(5, percent)}%`;
                    
                    // Algoritmaya göre renk değişimi
                    const algo = document.getElementById('algo-select').value;
                    if(algo === 'wiener') bar.style.background = 'linear-gradient(to top, #3a7bd5, #00d2ff)';
                    else if(algo === 'spectral') bar.style.background = 'linear-gradient(to top, #ff7e5f, #feb47b)';
                    else bar.style.background = 'linear-gradient(to top, #4ade80, #38bdf8)';
                    
                    bar.style.opacity = 0.4 + (percent / 100) * 0.6;
                });
            } else {
                bars.forEach((bar, index) => {
                    const targetHeight = Math.random() * 10 + 5;
                    bar.style.height = `${targetHeight}%`;
                    bar.style.opacity = 0.2;
                });
            }

            requestAnimationFrame(updateViz);
        }

        document.getElementById('file-input').addEventListener('change', function() {
            const overlay = document.getElementById('overlay');
            overlay.style.display = 'flex';
            
            setTimeout(() => {
                overlay.style.display = 'none';
                alert('Wiener filtreleme ve VAD optimizasyonu tamamlandı. Çıktı hazır.');
            }, 3000);
        });

        updateViz();
    </script>
</body>
</html>
